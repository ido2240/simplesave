<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SimpleSave — פשוט לחסוך</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top">
    <div class="logo">SimpleSave</div>
    <nav>
      <button type="button" data-nav="home">בית</button>
      <button type="button" data-nav="new">משכנתא חדשה</button>
      <button type="button" data-nav="refinance">מחזור</button>
      <button type="button" data-nav="insurance">ביטוח</button>
      <button type="button" data-nav="personal">אזור אישי</button>
    </nav>
  </header>

  <main id="app">
    <section id="view-home" class="view">
      <h1>פשוט לחסוך</h1>
      <p>השוואת משכנתאות, מחזור וביטוח — מבוסס חישוב Python.</p>
      <div class="cards">
        <button class="card" data-nav="new">משכנתא חדשה</button>
        <button class="card" data-nav="refinance">מחזור משכנתא</button>
        <button class="card" data-nav="insurance">ביטוח משכנתא</button>
      </div>
    </section>

    <section id="view-new" class="view hidden">
      <h2>משכנתא חדשה</h2>
      <form id="form-new" class="form-grid">
        <label>סוג הלוואה
          <select name="loan_type" required>
            <option value="single_property">נכס יחיד</option>
            <option value="additional_property">נכס נוסף</option>
            <option value="all_purpose">לכל מטרה</option>
            <option value="improvement">שיפור דיור</option>
          </select>
        </label>
        <label>מקור הנכס
          <select name="property_source" required>
            <option value="second_hand">יד 2</option>
            <option value="contractor">קבלן</option>
            <option value="target_price">מחיר למשתכן</option>
            <option value="self_build">בנייה עצמית</option>
          </select>
        </label>
        <label>שווי הנכס <input name="property_value" type="number" min="1" required value="2000000" /></label>
        <label>הון עצמי <input name="equity" type="number" min="0" required value="500000" /></label>
        <label>הכנסה נטו <input name="net_income" type="number" min="0" required value="25000" /></label>
        <label>הכנסות נוספות <input name="additional_income" type="number" min="0" value="0" /></label>
        <label>הוצאות קבועות <input name="fixed_expenses" type="number" min="0" value="0" /></label>
        <label>תשלום מינימום <input name="desired_min_payment" type="number" min="1" required value="6000" /></label>
        <label>תשלום מקסימום <input name="desired_max_payment" type="number" min="1" required value="9000" /></label>
        <label>שם מלא <input name="full_name" required value="לקוח לדוגמה" /></label>
        <label>תאריך לידה <input name="birth_date" type="date" required value="1985-06-15" /></label>
        <label><input name="is_property_owner" type="checkbox" checked /> רשום כבעל הנכס</label>
      </form>
      <button type="button" id="btn-new-clocks" class="primary">חשב 5 שעונים</button>
      <div id="new-errors" class="errors"></div>
      <div id="new-clocks" class="clocks"></div>
    </section>

    <section id="view-refinance" class="view hidden">
      <h2>מחזור משכנתא</h2>
      <form id="form-refi" class="form-grid">
        <label>שווי הנכס <input name="property_value" type="number" value="2000000" required /></label>
        <label>יתרת משכנתא <input name="existing_routes_balance" type="number" value="1200000" required /></label>
        <label>הכנסה נטו <input name="net_income" type="number" value="25000" required /></label>
        <label>תשלום מינימום <input name="desired_min_payment" type="number" value="5000" /></label>
        <label>תשלום מקסימום <input name="desired_max_payment" type="number" value="8000" /></label>
        <label>שם <input name="full_name" value="לקוח לדוגמה" required /></label>
        <label>תאריך לידה <input name="birth_date" type="date" value="1985-06-15" required /></label>
      </form>
      <label>דוח יתרות (PDF)
        <input type="file" id="balance-pdf" accept=".pdf" />
      </label>
      <button type="button" id="btn-refi-clocks" class="primary">חשב שעונים למחזור</button>
      <div id="refi-errors" class="errors"></div>
      <div id="refi-clocks" class="clocks"></div>
    </section>

    <section id="view-insurance" class="view hidden">
      <h2>ביטוח משכנתא</h2>
      <form id="form-insurance" class="form-grid">
        <label>סכום כיסוי <input name="coverage_amount" type="number" value="1500000" required /></label>
        <label>גיל <input name="age" type="number" min="18" max="85" value="40" required /></label>
      </form>
      <button type="button" id="btn-insurance" class="primary">השוואת הצעות</button>
      <div id="insurance-results"></div>
    </section>

    <section id="view-personal" class="view hidden">
      <h2>אזור אישי</h2>
      <form id="form-login" class="form-grid">
        <label>אימייל <input name="email" type="email" required placeholder="you@example.com" /></label>
        <button type="submit" class="primary">כניסה / הרשמה</button>
      </form>
      <p id="auth-status"></p>
      <div id="applications"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
