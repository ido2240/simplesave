document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ress{transition:transform .12s ease, box-shadow .2s ease, background .2s ease;}\n  .ss-press:active{transform:scale(.96);}\n  .ss-lift{transition:transform .22s cubic-bezier(.2,.8,.3,1), box-shadow .22s ease;}\n  .ss-lift:hover{transform:translateY(-4px);}\n  .ss-glow{transition:box-shadow .25s ease, transform .12s ease;}\n  .ss-glow:hover{box-shadow:0 16px 34px -14px rgba(37,73,201,0.5);}\n  .ss-glow:active{transform:scale(.97);}\n  @media (prefers-reduced-motion: reduce){*{animation:none !important;}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div dir=\"rtl\" class=\"ss-scroll\" style=\"font-family:'Heebo',sans-serif;background:#F6F8FC;color:#0E1B33;min-height:100vh;width:100%;direction:rtl;-webkit-font-smoothing:antialiased;\">\n\n  <!-- ============ TOP NAV ============ -->\n  <div style=\"position:sticky;top:0;z-index:40;background:rgba(255,255,255,0.86);backdrop-filter:blur(14px);border-bottom:1px solid #E8ECF5;\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:0 28px;height:72px;display:flex;align-items:center;justify-content:space-between;gap:24px;\">\n      <div style=\"display:flex;align-items:center;gap:18px;\">\n        <div onclick=\"{{ goHome }}\" style=\"display:flex;align-items:center;gap:11px;cursor:pointer;\">\n          <div style=\"width:40px;height:40px;border-radius:12px;background:linear-gradient(150deg,#2F57E0,#1A328C);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(37,73,201,0.3);\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M4 13.5 12 6l8 7.5\" stroke=\"#fff\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M9 19v-5h6v5\" stroke=\"#fff\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\"0.55\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"line-height:1;\">\n            <div style=\"font-weight:800;font-size:20px;letter-spacing:-0.3px;\">SimpleSave<\u002Fdiv>\n            <div style=\"font-size:11px;color:#7C89A6;font-weight:500;margin-top:3px;\">פשוט לחסוך<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:1px;height:30px;background:#E2E8F5;\"><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <div onclick=\"{{ goServices }}\" class=\"ss-press\" style=\"font-size:14px;font-weight:700;color:#fff;background:linear-gradient(150deg,#2F57E0,#1F379C);padding:11px 20px;border-radius:10px;cursor:pointer;box-shadow:0 6px 14px rgba(37,73,201,0.26);\">פתיחת בקשה<\u002Fdiv>\n          <div onclick=\"{{ goDash }}\" class=\"ss-press\" style=\"font-size:14px;font-weight:600;color:#2549C9;cursor:pointer;padding:9px 12px;border:1.4px solid #D4DDEF;border-radius:10px;\">כניסה<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px;\">\n        <div style=\"display:flex;align-items:center;gap:2px;background:#EEF1F8;border-radius:11px;padding:4px;\">\n          <div onclick=\"{{ setRoleClient }}\" style=\"{{ roleChipClient }}\">לקוח<\u002Fdiv>\n          <div onclick=\"{{ setRoleAdvisor }}\" style=\"{{ roleChipAdvisor }}\">יועץ<\u002Fdiv>\n          <div onclick=\"{{ setRoleManager }}\" style=\"{{ roleChipManager }}\">מנהל<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:6px;font-size:15px;font-weight:500;color:#41506E;\">\n          <div onclick=\"{{ goHome }}\" style=\"padding:9px 14px;border-radius:9px;cursor:pointer;\">דף הבית<\u002Fdiv>\n          <div onclick=\"{{ goServices }}\" style=\"padding:9px 14px;border-radius:9px;cursor:pointer;\">השירותים<\u002Fdiv>\n          <div onclick=\"{{ goDash }}\" style=\"padding:9px 14px;border-radius:9px;cursor:pointer;\">האזור האישי<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ HOME ============ -->\n  <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n  Ruhl Libre',serif;font-weight:700;font-size:30px;color:#0C1838;\">₪127K<\u002Fdiv><div style=\"font-size:13px;color:#7C89A6;font-weight:500;margin-top:2px;\">חיסכון ממוצע לאורך ההלוואה<\u002Fdiv><\u002Fdiv>\n            <div style=\"width:1px;background:#E2E8F5;\"><\u002Fdiv>\n            <div><div style=\"font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:30px;color:#0C1838;\">5 דק׳<\u002Fdiv><div style=\"font-size:13px;color:#7C89A6;font-weight:500;margin-top:2px;\">לקבלת חמש הצעות תמהיל<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- hero visual card -->\n        <div style=\"position:relative;\">\n          <div class=\"ss-float\" style=\"background:#fff;border:1px solid #E8ECF6;border-radius:24px;padding:26px;box-shadow:0 30px 60px -24px rgba(20,40,90,0.28);animation:ssFloat 5.5s ease-in-out infinite;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;\">\n              <div style=\"font-weight:700;font-size:16px;\">תמהיל מומלץ עבורך<\u002Fdiv>\n              <div style=\"font-size:12px;font-weight:700;color:#15976A;background:#E7F6EF;padding:5px 11px;border-radius:999px;\">סיכון בינוני<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;justify-content:center;margin:14px 0 6px;\">\n              <svg width=\"220\" height=\"128\" viewBox=\"0 0 220 128\">\n                <path d=\"M22 110 A88 88 0 0 1 50 45\" stroke=\"#1F9D6B\" stroke-width=\"17\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n                <path d=\"M62 36 A88 88 0 0 1 158 36\" stroke=\"#E0A100\" stroke-width=\"17\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n                <path d=\"M170 45 A88 88 0 0 1 198 110\" stroke=\"#E04848\" stroke-width=\"17\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath>\n                <g transform=\"rotate(-18 110 110)\"><line x1=\"110\" y1=\"110\" x2=\"110\" y2=\"44\" stroke=\"#0C1838\" stroke-width=\"5\" stroke-linecap=\"round\"><\u         <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- number -->\n      <sc-if value=\"{{ qIsNumber }}\">\n        <sc-if value=\"{{ qHasHint }}\"><div style=\"{{ hintStyle }}\">{{ hintText }}<\u002Fdiv><\u002Fsc-if>\n        <div style=\"position:relative;margin-top:14px;\">\n          <input type=\"tel\" value=\"{{ qValue }}\" oninput=\"{{ onNum }}\" style=\"width:100%;font-size:22px;font-weight:700;font-family:'Heebo';text-align:right;padding:16px 50px 16px 18px;border:1.6px solid #DCE3F0;border-radius:13px;color:#0C1838;outline:none;background:#FBFCFE;\">\n          <span style=\"position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:18px;color:#94A1BC;font-weight:600;\">₪<\u002Fspan>\n        <\u002Fdiv>\n        <sc-if value=\"{{ qHasSub2 }}\"><div style=\"font-size:13px;color:#7C89A6;margin-top:10px;\">{{ qSub2 }}<\u002Fdiv><\u002Fsc-if>\n      <\u002Fsc-if>\n\n      <!-- stepper -->\n      <sc-if value=\"{{ qIsStepper }}\">\n        <div style=\"display:flex;gap:11px;justify-content:center;margin-top:6px;\">\n          <sc-for list=\"{{ stepperCells }}\" as=\"c\" hint-placeholder-count=\"5\">\n            <div onclick=\"{{ c.onSelect }}\" style=\"{{ c.style }}\">{{ c.n }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"text-align:center;font-size:13px;color:#7C89A6;margin-top:14px;\">{{ borrowersNote }}<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- borrowers list -->\n      <sc-if value=\"{{ qIsBorrowers }}\">\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <sc-for list=\"{{ borrowerForms }}\" as=\"b\" hint-placeholder-count=\"2\">\n            <div style=\"border:1.5px solid #E6EBF4;border-radius:15px;padding:16px 18px;background:#FBFCFE;\">\n              <div style=\"font-weight:700;font-size:15px;color:#2549C9;margin-bottom:12px;\">{{ b.label }}<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;\">\n                <div><label styl :26px;line-height:1;\">⤓<\u002Fdiv>\n          <div style=\"font-weight:700;font-size:15px;margin-top:6px;\">העלאת דוח יתרות (PDF / JPG)<\u002Fdiv>\n          <div style=\"font-size:12.5px;opacity:.85;margin-top:3px;\">נסביר כיצד מפיקים דוח יתרות מכל בנק — המערכת תקרא את הנתונים אוטומטית<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin:22px 0 10px;\">\n          <div style=\"font-weight:700;font-size:15px;\">הזנת מסלולים ידנית (עד 10)<\u002Fdiv>\n          <sc-if value=\"{{ canAddTrack }}\"><div onclick=\"{{ addTrack }}\" style=\"font-size:13px;font-weight:700;color:#2549C9;border:1.4px solid #C9D6F7;border-radius:9px;padding:8px 14px;cursor:pointer;\">+ מסלול<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <sc-for list=\"{{ tracksForms }}\" as=\"t\" hint-placeholder-count=\"2\">\n            <div style=\"border:1.5px solid #E6EBF4;border-radius:14px;padding:15px 16px;background:#FBFCFE;\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;\">\n                <div style=\"font-weight:700;font-size:14px;color:#2549C9;\">{{ t.label }}<\u002Fdiv>\n                <sc-if value=\"{{ t.canRemove }}\"><div onclick=\"{{ t.onRemove }}\" style=\"font-size:12px;font-weight:600;color:#B53A2E;cursor:pointer;\">הסר<\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:11px;\">\n                <div><label style=\"font-size:12px;font-weight:600;color:#5A6B8C;\">יתרת קרן (₪)<\u002Flabel><input type=\"tel\" value=\"{{ t.balance }}\" oninput=\"{{ t.onBalance }}\" placeholder=\"0\" style=\"width:100%;margin-top:5px;padding:10px 12px;border:1.5px solid #DCE3F0;border-radius:9px;font-size:14px;text-align:right;outline:none;background:#fff;\"><\u002Fdiv>\n                <div><label style=\"font-size:12px;font-weight:600;color:#5A6B8C;\">סוג ריבית<\u002Flabel><select value=\"{{ t.rateType }}\" onchange=\"{{ t.onType }}\" style=\"width:100%;margin-top:5px;padding:10px 12px;border:1.5px solid #DCE3F0;border-radius:9px;font-size:14px;background:#fff;color:#0C1838;outline:none;\"><option value=\"fixed\">קבועה<\u002Foption><option value=\"variable\">משתנה<\u002Foption><option value=\"prime\">פריים<\u002Foption><\u002Fselect><\u002Fdiv>\n                <div><label style=\"font-size:12px;font-weight:600;color:#5A6B8C;\">ריבית (%)<\u002Flabel><input type=\"tel\" value=\"{{ t.rate }}\" oninput=\"{{ t.onRate }}\" placeholder=\"0.00\" style=\"width:100%;margin-top:5px;padding:10px 12px;border:1.5px solid #DCE3F0;border-radius:9px;font-size:14px;text-align:right;outline:none;background:#fff;\"><\u002Fdiv>\n                <div><label style=\"font-size:12px;font-weight:600;color:#5A6B8C;\">תאריך סיום<\u002Flabel><input value=\"{{ t.endDate }}\" oninput=\"{{ t.onEnd }}\" placeholder=\"mm/yyyy\" style=\"width:100%;margin-top:5px;padding:10px 12px;border:1.5px solid #DCE3F0;border-radius:9px;font-size:14px;text-align:right;outline:none;background:#fff;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <label style=\"display:flex;align-items:center;gap:8px;margin-top:11px;font-size:13px;color:#3C4A66;cursor:pointer;\"><input type=\"checkbox\" checked=\"{{ t.linked }}\" onchange=\"{{ t.onLinked }}\" style=\"width:16px;height:16px;accent-color:#2549C9;\">צמוד למדד<\u002Flabel>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- slider -->\n      <sc-if value=\"{{ qIsRange }}\">\n        <div style=\"{{ hintStyle }}\">{{ hintText }}<\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-top:20px;\">\n          <span style=\"font-size:14px;color:#6A7892;font-weight:500;\">החזר חודשי רצוי<\u002Fspan>\n          <span style=\"font-family:'Frank Ruhl Libre',serif;font-weight:700;font- ;animation:ssRise .5s cubic-bezier(.2,.8,.3,1) both;\">\n      <div style=\"display:flex;align-items:center;gap:12px;\">\n        <div style=\"width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M20 7a8 8 0 0 0-14-2M4 5v4h4M4 17a8 8 0 0 0 14 2M20 19v-4h-4\" stroke=\"#7DE6B4\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div><div style=\"color:#9FB0D4;font-size:12.5px;font-weight:600;\">המשכנתא הקיימת שלך<\u002Fdiv><div style=\"color:#fff;font-size:15px;font-weight:700;margin-top:2px;\">יתרה {{ existBalance }} · החזר {{ existMonthly }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:26px;\">\n        <div style=\"text-align:center;\"><div style=\"color:#9FB0D4;font-size:12px;\">סה״כ תשלומים כיום<\u002Fdiv><div style=\"color:#fff;font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:19px;margin-top:2px;\">{{ existTotal }}<\u002Fdiv><\u002Fdiv>\n        <div style=\"width:1px;background:rgba(255,255,255,0.14);\"><\u002Fdiv>\n        <div style=\"text-align:center;\"><div style=\"color:#9FB0D4;font-size:12px;\">חיסכון אפשרי עד<\u002Fdiv><div style=\"color:#7DE6B4;font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:19px;margin-top:2px;\">{{ bestSaving }}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:16px;\">\n      <sc-for list=\"{{ options }}\" as=\"opt\" hint-placeholder-count=\"5\">\n        <div class=\"ss-lift\" style=\"{{ opt.cardStyle }}\">\n          <sc-if value=\"{{ opt.recommended }}\"><div style=\"position:absolute;top:-11px;right:50%;transform:translateX(50%);font-size:11.5px;font-weight:800;color:#fff;background:linear-gradient(90deg,#2F57E0,#1F379C);padding:5px 14px;border-radius:999px;white-space:nowrap;animation:ssPulse 2.2s ease-in-out infinite;\">★ הכי משתלם<\u002Fdiv><\u002Fsc-if>\n          <sc-if value=\"{{ opt.selected }}\"><div style=\"position:absolute;top:12px;left:12px;width:24px;height:24px;border-radius:50%;background:#2549C9;display:flex;align-items:center;justify-content:center;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12.5 10 17 19 7\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><\u002Fsc-if>\n          <div style=\"font-weight:800;font-size:17px;color:#1A2542;\">{{ opt.name }}<\u002Fdiv>\n          <div style=\"font-size:12px;color:#8492AC;margin-top:2px;min-height:32px;\">{{ opt.sub }}<\u002Fdiv>\n          <div style=\"display:flex;justify-content:center;margin:6px 0 0;\">{{ opt.gauge }}<\u002Fdiv>\n          <div style=\"text-align:center;font-size:13px;font-weight:700;color:{{ opt.riskColor }};margin-top:-4px;\">סיכון {{ opt.riskLabel }}<\u002Fdiv>\n          <div style=\"background:#F6F8FC;border-radius:13px;padding:13px 14px;margin-top:14px;display:flex;flex-direction:column;gap:9px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;\"><span style=\"font-size:12px;color:#7C89A6;\">החזר חודשי<\u002Fspan><span style=\"font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:18px;color:#0C1838;\">{{ opt.monthly }}<\u002Fspan><\u002Fdiv>\n            <div style=\"height:1px;background:#E6EBF4;\"><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;\"><span style=\"font-size:12px;color:#7C89A6;\">סה״כ תשלומים<\u002Fspan><span style=\"font-size:13.5px;font-weight:700;color:#3C4A66;\">{{ opt.total }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;\"><span style=\"font-size:12px;color:#7C89A6;\">מזה ריבית<\u002Fspan><span style=\"font-size:13.5px;font-weight:700;color:#3C4A66;\">{{ opt.inter e=\"#7DE6B4\" stroke-width=\"1.8\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>מאובטח בתקן 13 לחוק הגנת הפרטיות · נגישות מלאה<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:900},&quot;demoStage&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;details&quot;,&quot;docs&quot;,&quot;approval&quot;],&quot;default&quot;:&quot;docs&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showGauges&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'home',\n    service: 'new',\n    step: 0,\n    ans: { type:'single', source:'yad2', value:1800000, equity:500000, borrowers:2, income:18000, monthly:7000, expenses:5000, existingBank:'', existingBalance:1100000, goal:'save', tracks:[{balance:'650000',rateType:'fixed',rate:'4.9',endDate:'2039-06',linked:true},{balance:'450000',rateType:'prime',rate:'5.6',endDate:'2034-06',linked:false}], borrowersData:[{name:'עידו כהן',birth:'26.02.1991',income:'15000'}] },\n    borrowerTab: 0,\n    detailTab: 'charts',\n    hoverBar: -1,\n    gaugeAnim: false,\n    role: 'client',\n    advisorTab: 'clients',\n    managerTab: 'leads',\n    editTmhil: 0,\n    selected: -1,\n    detail: -1,\n    panel: 'docs',\n    docState: { auth:0, osh:0, pay:0, id:0, contract:0, appraisal:0 },\n  };\n\n  // ---------- helpers ----------\n  fmt(n){ return '\\u202A' + Math.round(n).toLocaleString('en-US') + ' ₪\\u202C'; }\n  annuity(P,i,n){ if(!i) return P/n; return P*i/(1-Math.pow(1+i,-n)); }\n  pol(cx,cy,r,deg){ const a=deg*Math.PI/180; return [cx + r*Math.cos(a), cy - r*Math.sin(a)]; }\n  loanSafe(){\n    if(this.state.service==='refi'){ const t=this.state.ans.tracks||[]; const s=t.reduce((a,x)=>a+(parseFloat(x.balance)||0),0); return s>1000?s:1100000; }\n    if(this.state.service==='ins'){ const v=parseFloat(this.state.ans.value)||0; return v>1000?v:1100000; }\n    const l=this.finance().loan; return (l && l>1000)?l:1300000;\n  }\n\n  finance(){\n    const a=this.state.ans;\n    const typeCap = a.type==='single'?0.75:0.5;\n    let srcCap = 0.75; if(a.source==='mehir') srcCap=0.9;\n    const ltv = Math.min(typeCap, srcCap);\n    const maxLoan = a.value*ltv;\n    const reqEquity = a.value*(1-ltv);\n    const loan = Math.max(0, Math.min(a.value-a.equity, maxLoan));\n    return { ltv, maxLoan, reqEquity, loan, maxMonthly: a.income*0.4, equityOk: a.equity>=reqEquity };\n  }\n\n  buildOptions(){\n    const loan = this.loanSafe();\n    const defs = [\n      { name:'תמהיל סולידי', sub:'יציבות מקסימלית, רוב קבועה', rate:0.049, risk:24, mix:[70,20,10] },\n      { name:'תמהיל מאוזן', sub:'איזון בין יציבות לחיסכון', rate:0.046, risk:40, mix:[55,25,20] },\n      { name:'תמהיל מומלץ', sub:'התאמה אופטימלית לפרופיל', rate:0.043, risk:55, mix:[45,25,30] },\n      { name:'תמהיל גמיש', sub:'חיסכון גבוה, חשיפה מתונה', rate:0.040, risk:70, mix:[33,27,40] },\n      { name:'תמהיל אגרסיבי', sub:'ההחזר הנמוך ביותר בהתחלה', rate:0.037, risk:84, mix:[20,30,50] },\n    ];\n    const N=this.offerMonths();\n    return defs.map((d,i)=>{\n      const m=this.annuity(loan, d.rate/12, N);\n      const total=m*N; const interest=total-loan;\n      return { ...d, idx:i, monthly:m, total, interest, months:N };\n    });\n  }\n\n  existingSummary(){\n    const tracks=this.state.ans.tracks||[];\n    let bal=0,monthly=0,total=0,wMonths=0;\n    tracks.forEach(t=>{\n      const b=parseFloat(t.balance)||0; if(!b) return;\n      const r=(parseFloat(t.rate)|| (t.rateType==='prime'?5.6:4.8))/100;\n      let months=228;\n      const m=(t.endDate||'').match(/(\\d{4})[-\\/](\\d{1,2})/) || (t.endDate||'').match(/(\\d{1,2})[-\\/](\\d{4})/);\n      if(m){ let y,mo; if((m[1]||'').length===4){y=+m[1];mo=+m[2];}else{mo=+m[1];y=+m[2];} months=Math.max(12,(y-2026)*12+(mo-6)); }\n      const pay=this.annuity(b, r/12, months);\n      bal+=b; monthly+=pay; total+=pay*months; wMonths+=months*b;\n    });\n    if(bal<1000){ bal=1100000; monthly=11468; total=11468*125; wMonths=125*bal; }\n    const months = bal>0 ? Math.round(wMonths/bal) : 228;\n    return { balance:bal, monthly, total, interest:total-bal, months };\n  }\n  // months horizon used for offers: refi matches the existing remaining term\n  offerMonths(){ return this.state.service==='refi' ? Math.max(48, this.existingSummary().months) : 300; }\n  insuranceCompanies(){\n    const sum=this.loanSafe(), N=300;\n    const defs=[\n      { name:'הראל', short:'הר', rating:4.6, factor:0.000395, color:'#2549C9' },\n      { name:'הפניקס', short:'הפ', rating:4.5, factor:0.000412, color:'#7A4FE0' },\n      { name:'מנורה מבטחים', short:'מנ', rating:4.4, factor:0.000428, color:'#1FA0A0' },\n      { name:'מגדל', short:'מג', rating:4.3, factor:0.000447, color:'#D9820B' },\n      { name:'כלל ביטוח', short:'כל', rating:4.1, factor:0.000465, color:'#C24C8E' },\n    ];\n    const rows=defs.map((d,i)=>{\n      const first=sum*d.factor;           // monthly first-year premium\n      const avg=first*0.63;               // declining-balance average\n      const total=avg*N;\n      return { ...d, idx:i, first, avg, total };\n    }).sort((a,b)=>a.total-b.total);\n    return rows;\n  }\n  premiumSpark(c){\n    const h=React.createElement, W=88, H=34, n=12;\n    const pts=[]; for(let i=0;i<n;i++){ const v=c.first*(1 - 0.62*(i/(n-1))); pts.push(v); }\n    const mx=c.first, mn=c.first*0.34;\n    const X=i=> 2 + (W-4)*(i/(n-1));\n    const Y=v=> 3 + (H-6)*(1-(v-mn)/(mx-mn));\n    const d=pts.map((v,i)=>`${i?'L':'M'} ${X(i).toFixed(1)} ${Y(v).toFixed(1)}`).join(' ');\n    const area=d+` L ${X(n-1).toFixed(1)} ${H-2} L ${X(0).toFixed(1)} ${H-2} Z`;\n    return h('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`,style:{display:'block'}},\n      h('path',{d:area,fill:c.color,opacity:0.1}),\n      h('path',{d,stroke:c.color,strokeWidth:2,fill:'none',strokeLinecap:'round',strokeLinejoin:'round'}),\n      h('circle',{cx:X(0),cy:Y(pts[0]),r:2.4,fill:c.color}),\n      h('circle',{cx:X(n-1),cy:Y(pts[n-1]),r:2.4,fill:c.color}),\n    );\n  }\n  advisorClients(){\n    return [\n      { name:'עידו כהן', service:'משכנתא חדשה', stage:'בתהליך', step:'העלאת מסמכים', next:'היום 14:00', amount:'₪1.3M', unread:1, color:'#2549C9', av:'עכ' },\n      { name:'מאיה לוי', service:'מחזור משכנתא', stage:'בתהליך', step:'אישור עקרוני', next:'מחר 10:30', amount:'₪890K', unread:0, color:'#15976A', av:'מל' },\n      { name:'דניאל אבוטבול', service:'משכנתא חדשה', stage:'לפני תהליך', step:'מילוי פרטים', next:'27/06 09:00', amount:'₪2.1M', unread:3, color:'#2549C9', av:'דא' },\n      { name:'רוני שטרן', service:'ביטוח משכנתא', stage:'אחרי תהליך', step:'הושלם', next:'—', amount:'₪540K', unread:0, color:'#D9820B', av:'רש' },\n      { name:'תמר פרידמן', service:'מחזור משכנתא', stage:'בתהליך', step:'בחירת בנק', next:'28/06 16:00', amount:'₪1.6M', unread:2, color:'#15976A', av:'תפ' },\n    ];\n  }\n  advisorTasks(){\n    return [\n      { txt:'לבדוק תלושי שכר — עידו כהן', due:'היום', done:false, urgent:true },\n      { txt:'להחזיר שיחה למאיה לוי', due:'היום', done:false, urgent:true },\n      { txt:'להעלות אישור עקרוני — תמר פרידמן', due:'מחר', done:false, urgent:false },\n      { txt:'לסגור תיק — רוני שטרן', due:'27/06', done:true, urgent:false },\n    ];\n  }\n  managerLeads(){\n    return [\n      { name:'אבי נחום', service:'משכנתא חדשה', time:'לפני 8 דק׳', amount:'₪1.45M', assigned:'', color:'#2549C9' },\n      { name:'שירה ביטון', service:'מחזור משכנתא', time:'לפני 25 דק׳', amount:'₪720K', assigned:'יעל ברק', color:'#15976A' },\n      { name:'יוסף מזרחי', service:'ביטוח משכנתא', time:'לפני שעה', amount:'₪610K', assigned:'', color:'#D9820B' },\n      { name:'נועה כץ', service:'משכנתא חדשה', time:'לפני 3 שעות', amount:'₪2.4M', assigned:'אורן גל', color:'#2549C9' },\n    ];\n  }\n  managerAdvisors(){\n    return [\n      { name:'יעל ברק', clients:14, active:9, closed:128, load:72, av:'יב' },\n      { name:'אורן גל', clients:11, active:6, closed:94, load:55, av:'אג' },\n      { name:'דנה אבני', clients:17, active:12, closed:151, load:88, av:'דא' },\n    ];\n  }\n  managerTmhilim(){\n    return [\n      { name:'תמהיל סולידי', tracks:[\n        { type:'קבועה צמודה', period:25, index:true, pct:50, anchor:'4.85%', method:'שפיצר' },\n        { type:'משתנה כל 5', period:20, index:false, pct:30, anchor:'4.55%', method:'שפיצר' },\n        { type:'פריים', period:15, index:false, pct:20, anchor:'P-0.6%', method:'שפיצר' },\n      ]},\n      { name:'תמהיל מאוזן', tracks:[\n        { type:'קבועה צמודה', period:25, index:true, pct:40, anchor:'4.70%', method:'שפיצר' },\n        { type:'משתנה כל 5', period:22, index:false, pct:35, anchor:'4.45%', method:'שפיצר' },\n        { type:'פריים', period:18, index:false, pct:25, anchor:'P-0.5%', method:'שפיצר' },\n      ]},\n      { name:'תמהיל מומלץ', tracks:[\n        { type:'קבועה לא צמודה', period:25, index:false, pct:45, anchor:'4.30%', method:'שפיצר' },\n        { type:'משתנה כל 5', period:20, index:true, pct:25, anchor:'3.90%', method:'שפיצר' },\n        { type:'פריים', period:15, index:false, pct:30, anchor:'P-0.7%', method:'שפיצר' },\n      ]},\n    ];\n  }\n  marketParams(){\n    return [\n      { label:'ריבית פריים', value:'6.00%', sub:'בנק ישראל + 1.5%', icon:'P', color:'#2549C9' },\n      { label:'מדד צפוי שנתי', value:'3.0%', sub:'תחזית למדד המחירים', icon:'%', color:'#15976A' },\n      { label:'עוגן קבועה צמודה', value:'4.85%', sub:'אג״ח ממשלתי 25 שנה', icon:'₪', color:'#7A4FE0' },\n      { label:'עוגן משתנה כל 5', value:'4.20%', sub:'עוגן ריביות משתנות', icon:'~', color:'#D9820B' },\n    ];\n  }\n  activeProgressRing(paid,total){\n    const h=React.createElement, cx=80, cy=80, r=64, C=2*Math.PI*r, pct=paid/total;\n    return h('svg',{width:160,height:160,viewBox:'0 0 160 160'},\n      h('circle',{cx,cy,r,stroke:'#EDF1F8',strokeWidth:13,fill:'none'
